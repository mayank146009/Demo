on: 
  push:
    branches:
      - feature/demo_feature

jobs:
  job_sync:
    runs-on: [self-hosted]
    env:
       Win_Topaz_Location: ${{ vars.TOPAZ_LOCATION }}
    name: Code Pipeline Sync on self-hosted runners
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Synchronize
        uses: bmc-compuware/ispw-sync-local@v2.0
        id: sync-local
        with:
          host: 'cwcc.bmc.com'
          port: 16196
          uid: 'HAUNXG0'
          pass: ${{ secrets.ISPW_USER_PWD }}
          runtimeConfiguration: 'iccga'
          stream: 'GITFLOW'
          application: 'GITFLOWI'
          subAppl: 'GITFLOWI'
          checkoutLevel: 'UNIT'
          gitUid: '@neilg001abc'
          gitToken: ${{ secrets.NEILG001ABC_GITHUB_TOKEN }}
          winTopazPath: ${{ vars.TOPAZ_LOCATION }}
          ispwConfigPath: "GenApp_MainframeCore/ispwconfig.yml"
          assignmentPrefix: "GFLI"
          showEnv: true
      - name: Generate
        uses: bmc-compuware/ispw-generate@v1
        id: generate
        with:
          ces_url: 'https://cwcc.bmc.com:2020/'
          ces_token: ${{ secrets.CES_TOKEN }}
          srid: 'CCGA'
          runtime_configuration: 'ICCGA'
          generate_automatically: ${{ steps.sync-local.outputs.automaticBuildJson }}
      - name: Get the number of generate failures
        run: echo "The number of generate failures is ${{ steps.generate.outputs.generate_failed_count }}"
